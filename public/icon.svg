<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="glowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8" />
      <stop offset="50%" stop-color="#6366f1" />
      <stop offset="100%" stop-color="#a855f7" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <!-- Background with Slate Theme -->
  <rect width="512" height="512" rx="128" fill="#0f172a" />
  <!-- Hexagon Outer Boundary -->
  <polygon points="256,40 440,146 440,366 256,472 72,366 72,146" fill="none" stroke="url(#glowGrad)" stroke-width="12" stroke-linejoin="round" filter="url(#glow)" />
  <polygon points="256,60 420,155 420,355 256,450 92,355 92,155" fill="none" stroke="url(#glowGrad)" stroke-width="3" stroke-dasharray="8 8" opacity="0.4" />
  <!-- Stylized Arabic Programming / Brain Element -->
  <g transform="translate(256, 260) scale(1.1)">
    <!-- Circuit lines inside / Background elements -->
    <path d="M-80,-100 L-40,-100 L0,-50 L40,-100 L80,-100" fill="none" stroke="#475569" stroke-width="4" stroke-linecap="round" />
    <path d="M-100,0 L-50,0 M100,0 L50,0" fill="none" stroke="#475569" stroke-width="4" stroke-linecap="round" />
    <path d="M-80,100 L-45,50 L45,50 L80,100" fill="none" stroke="#475569" stroke-width="4" stroke-linecap="round" />
    
    <!-- Stylized Arabic Word 'البيان' or 'َب' in radiant gradient -->
    <path d="M-70,40 C-70,-60 70,-60 70,40 L45,40 C45,-20 -45,-20 -45,40 Z" fill="url(#glowGrad)" filter="url(#glow)" />
    <!-- Diacritic Point (Nuqtah) of Bayan 'ب' underneath -->
    <circle cx="0" cy="85" r="16" fill="url(#glowGrad)" filter="url(#glow)" />
    <!-- Inner glowing node logic -->
    <circle cx="0" cy="-45" r="8" fill="#38bdf8" />
    <circle cx="-45" cy="40" r="6" fill="#6366f1" />
    <circle cx="45" cy="40" r="6" fill="#a855f7" />
  </g>
</svg>
