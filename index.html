<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#0f172a" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Al-Bayan Studio | محرر البيان</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;800&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <style>
      body {
        font-family: 'Cairo', sans-serif;
        background-color: #0f172a;
        color: #e2e8f0;
      }
      .font-mono {
        font-family: 'Fira Code', monospace;
      }
      /* Custom Scrollbar */
      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #1e293b; 
      }
      ::-webkit-scrollbar-thumb {
        background: #475569; 
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #64748b; 
      }

      /* Print Media Styles for Native PDF Generation */
      @media print {
        body, html {
          background: #ffffff !important;
          color: #000000 !important;
          font-family: 'Cairo', 'Inter', sans-serif !important;
          direction: rtl !important;
        }
        /* Hide UI controls, editor, compile lists, sidebars during print */
        header, aside, .no-print, nav, button, footer {
          display: none !important;
        }
        /* Make sure the report covers the full width and has no dark card colors */
        .printing-document-sheet {
          background: #ffffff !important;
          color: #000000 !important;
          border: none !important;
          box-shadow: none !important;
          padding: 0 !important;
          margin: 0 !important;
          max-width: 100% !important;
          width: 100% !important;
        }
        .printing-document-sheet h1,
        .printing-document-sheet h2,
        .printing-document-sheet h3 {
          color: #000000 !important;
          border-color: #cbd5e1 !important;
        }
        .printing-document-sheet p,
        .printing-document-sheet span,
        .printing-document-sheet td,
        .printing-document-sheet li,
        .printing-document-sheet div {
          color: #1e293b !important;
        }
        .print-only-title {
          padding-top: 4cm !important;
          border-bottom: 2px solid #000000 !important;
          page-break-after: always;
        }
        .print-page {
          page-break-after: always;
          page-break-inside: avoid;
          padding-top: 1cm;
        }
        th {
          color: #000000 !important;
        }
        code, pre {
          background-color: #f8fafc !important;
          color: #0f172a !important;
          border: 1px solid #e2e8f0 !important;
        }
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "vite": "https://aistudiocdn.com/vite@^7.2.4",
    "@vitejs/plugin-react": "https://aistudiocdn.com/@vitejs/plugin-react@^5.1.1",
    "react/": "https://aistudiocdn.com/react@^19.2.0/",
    "react": "https://aistudiocdn.com/react@^19.2.0",
    "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.0/",
    "lucide-react": "https://aistudiocdn.com/lucide-react@^0.555.0",
    "globals": "https://aistudiocdn.com/globals@^16.5.0",
    "@eslint/js": "https://aistudiocdn.com/@eslint/js@^9.39.1",
    "eslint-plugin-react-hooks": "https://aistudiocdn.com/eslint-plugin-react-hooks@^7.0.1",
    "eslint-plugin-react-refresh": "https://aistudiocdn.com/eslint-plugin-react-refresh@^0.4.24",
    "typescript-eslint": "https://aistudiocdn.com/typescript-eslint@^8.48.0"
  }
}
</script>
</head>
